name: Lean kernel verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formal
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          nanoda: false

      - name: Reject theorem placeholders
        run: |
          if grep -RInE '(^|[^[:alnum:]_])(sorry|admit)([^[:alnum:]_]|$)' formal/AMCEP.lean formal/AMCEP; then
            echo 'Lean placeholder detected'
            exit 1
          fi

      - name: Build Lean theorem library
        working-directory: formal
        run: |
          set -o pipefail
          lake build 2>&1 | tee lean-build.log

      - name: Upload Lean diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-log
          path: formal/lean-build.log
          if-no-files-found: warn
          retention-days: 14
