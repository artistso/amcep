name: Lean kernel verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and independently check Lean declarations
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formal
          build: true
          test: false
          lint: false
          use-mathlib-cache: true
          nanoda: true
          nanoda-allow-sorry: false
