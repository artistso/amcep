name: Lean kernel verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --no-modify-path
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve pinned Lean and Mathlib
        working-directory: formal
        run: |
          set -o pipefail
          lake update 2>&1 | tee lean-setup.log
          lake exe cache get 2>&1 | tee -a lean-setup.log

      - name: Reject theorem placeholders
        run: |
          if grep -RInE '(^|[^[:alnum:]_])(sorry|admit)([^[:alnum:]_]|$)' formal/AMCEP.lean formal/AMCEP; then
            echo 'Lean placeholder detected'
            exit 1
          fi

      - name: Build Lean theorem library
        working-directory: formal
        run: |
          set -o pipefail
          lake build 2>&1 | tee lean-build.log

      - name: Upload Lean diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-diagnostics
          path: |
            formal/lean-setup.log
            formal/lean-build.log
          if-no-files-found: warn
          retention-days: 14
