name: AMCEP audit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run mathematical boundary tests
        run: python -m unittest discover -s tests -v
      - name: Validate public site assets
        run: |
          test -s index.html
          test -s styles.css
          test -s app.js
          grep -q "Falsification Lab" index.html
