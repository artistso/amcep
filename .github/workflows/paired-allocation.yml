name: Paired allocation counterfactuals

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  paired-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install research dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Lint and type-check paired implementation
        run: |
          ruff check src/paired_allocation.py tests/test_paired_allocation.py scripts/run_paired_allocation.py
          mypy --strict src/paired_allocation.py scripts/run_paired_allocation.py

      - name: Run paired tests
        id: paired-tests
        continue-on-error: true
        run: |
          mkdir -p results/paired-allocation/diagnostics
          set -o pipefail
          pytest tests/test_paired_allocation.py -vv --maxfail=1 \
            --junitxml=results/paired-allocation/diagnostics/junit.xml \
            2>&1 | tee results/paired-allocation/diagnostics/pytest.log

      - name: Upload paired test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amcep-paired-allocation-diagnostics-${{ github.sha }}
          path: results/paired-allocation/diagnostics
          if-no-files-found: error
          retention-days: 30

      - name: Enforce paired test gate
        if: steps.paired-tests.outcome != 'success'
        run: exit 1

      - name: Execute locked paired matrix
        run: |
          python scripts/run_paired_allocation.py \
            --output-dir results/paired-allocation/ci \
            --seed-start 20260716 \
            --seed-count 30 \
            --attack-rates 0,0.1,0.25,0.5 \
            --bootstrap-resamples 1000

      - name: Validate reproducibility bundle
        run: |
          test -s results/paired-allocation/ci/manifest.json
          test -s results/paired-allocation/ci/config.json
          test -s results/paired-allocation/ci/scenarios.json
          test -s results/paired-allocation/ci/paired-deltas.json
          test -s results/paired-allocation/ci/paired-aggregates.json
          test -s results/paired-allocation/ci/environment.txt
          test -s results/paired-allocation/ci/checksums.txt
          python -m json.tool results/paired-allocation/ci/manifest.json >/dev/null
          python -m json.tool results/paired-allocation/ci/config.json >/dev/null
          python -m json.tool results/paired-allocation/ci/scenarios.json >/dev/null
          python -m json.tool results/paired-allocation/ci/paired-deltas.json >/dev/null
          python -m json.tool results/paired-allocation/ci/paired-aggregates.json >/dev/null
          cd results/paired-allocation/ci
          sha256sum --check checksums.txt

      - name: Upload immutable paired allocation bundle
        uses: actions/upload-artifact@v4
        with:
          name: amcep-paired-allocation-${{ github.sha }}
          path: results/paired-allocation/ci
          if-no-files-found: error
          retention-days: 90
